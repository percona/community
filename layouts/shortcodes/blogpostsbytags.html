<div class="contentblock pg-talks">
<h2>{{- .Get "Title" -}}</h2>
<div class="grid grid--3">
{{- $tags := .Get "tags" -}}
{{- $array := split $tags "," -}}
{{- range first 3 (where (where $.Page.Site.RegularPages "Section" "blog") "Params.tags" "intersect" $array ) -}}
<div class="grid__item">{{ partial "hub-single/blog-card.html" . }}</div>
{{- end -}}
</div>
{{ .Inner }}
</div>
