{{/*
  Loads community-search.js (embed mode). Overlay UI in community-search-header.html.
*/}}
<script>
  window.CommunitySearchConfig = {
    mode: 'embed',
    apiUrl: "{{ .Site.Params.searchApiUrl | default "" }}",
    input: "{{ .Site.Params.searchInputSelector | default "#community-search-input" }}",
    button: "{{ .Site.Params.searchButtonSelector | default "#community-search-button" }}",
    mount: "{{ .Site.Params.searchMountSelector | default "#community-search-results" }}",
    resultsPageUrl: "{{ .Site.Params.searchPageUrl | default "/search/" }}",
    limit: {{ .Site.Params.searchLimit | default 12 }},
  };
</script>
{{ $api := .Site.Params.searchApiUrl | default "" }}
