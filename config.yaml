baseURL: "https://percona.community/"
disablePathToLower: false
languageCode: "en-us"
title: "Percona Community"
copyright: |
  © Percona Community. MySQL, InnoDB, MariaDB and MongoDB are trademarks of their respective owners.
disableHugoGeneratorInject: true
params:
  favicon: superhero.png
  searchApiUrl: "https://search.percona.community"
  searchPageUrl: "/search/"
  searchInputSelector: "#community-search-input"
  searchButtonSelector: "#community-search-button"
  searchMountSelector: "#community-search-results"
  searchLimit: 12
  searchLimitPage: 30
  searchColumns: 3
  images:
    - hub/home/cover.jpg
buildFuture: true
taxonomies:
  tag: tags
  category: categories
  contributor_type: "contributor_type"
  contributor_tag: "contributor_tag"
  contributor_year: "contributor_year"
  talk_tags: "talk_tags"
  talk_year: "talk_year"
  events_category: "events_category"
  events_year: "events_year"
  events_tag: "events_tag"
social:
  twitter: Percona
sitemap:
  changefreq: daily
  filename: sitemap.xml
  priority: 1
markup:
  goldmark:
    extensions:
      definitionList: true
      footnote: true
      linkify: true
      strikethrough: true
      table: true
      taskList: true
      typographer: true
    renderer:
      unsafe: true
  highlight:
    codeFences: true
    guessSyntax: true
    hl_Lines: ""
    lineNoStart: 1
    lineNos: false
    lineNumbersInTable: true
    noClasses: false
    style: monokai
    tabWidth: 4
