community_content:
  title: From the
  title_accent: wider community
  intro: |
    Articles and videos about Percona software published on external blogs and YouTube — shared by users, customers, and database enthusiasts.

    Wrote a post or recorded a tutorial? Publish it on your platform and add it to our collection.
  cards:
    - image_title: Community articles
      text: Write about Percona products on your own blog, then send the link to community-team@percona.com — we curate anything that covers our stack, wherever it's published.
      image: hub/cards/nature-4.jpg
      links:
        - url: /contribute/articles/
          cta: Share an article
        - url: /contribute/opentopics/
          cta: Open topics
    - image_title: Community videos
      text: Record a tutorial or a talk about open source databases, publish it on YouTube, and send the link to community-team@percona.com. Creators of any size welcome.
      image: hub/cards/nature-3.jpg
      links:
        - url: /contribute/videos/
          cta: Community videos
    - image_title: Events
      text: Organize a local meetup, or join our conferences and online sessions. Connect with the practitioners running these databases in production and share what you know.
      image: hub/cards/nature-2.jpg
      links:
        - url: /events/
          cta: See events
